<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pré-visualização SD</title>
  <style>
    :root {
      --bg: #edf2fa;
      --surface: #ffffff;
      --surface-soft: #f4f7fc;
      --border: #d6e0ef;
      --text: #162339;
      --muted: #66758f;
      --shadow: 0 10px 28px rgba(8, 36, 73, 0.09);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Tahoma", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    .sd-sheet {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .sd-banner {
      padding: 18px;
      background: linear-gradient(120deg, rgba(15, 45, 82, 0.12), rgba(28, 77, 134, 0.08));
      border-bottom: 1px solid var(--border);
    }
    .sd-subtitle {
      color: var(--muted);
      margin: 6px 0 0;
    }
    .sd-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      padding: 14px;
    }
    .sd-card {
      border: 1px solid var(--border);
      background: var(--surface-soft);
      border-radius: 12px;
      padding: 12px;
    }
    .sd-card h4 {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .sd-card p {
      margin: 0;
      white-space: pre-wrap;
    }
    .sd-card.full { grid-column: 1 / -1; }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      table-layout: fixed;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      font-size: 13px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    th { background: #eef3fb; }
    tr:last-child td { border-bottom: none; }

    .assinatura-box {
      margin-top: 18px;
      max-width: 420px;
    }
    .assinatura-line {
      border-top: 1px solid var(--text);
      margin-bottom: 8px;
    }

    @media (max-width: 900px) {
      body { padding: 10px; }
      .sd-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  {% include 'workflow/_sd_preview_sheet.html' %}
</body>
</html>
