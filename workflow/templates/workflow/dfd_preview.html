{% extends 'workflow/base.html' %}

{% block extra_head %}
<style>
  .dfd-wrap {
    display: grid;
    gap: 16px;
  }

  .dfd-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .dfd-title {
    margin: 0;
    font-size: clamp(24px, 3vw, 34px);
    line-height: 1.1;
  }

  .dfd-subtitle {
    color: var(--muted);
    margin: 6px 0 0;
  }

  .dfd-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .dfd-sheet {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .dfd-banner {
    padding: 22px;
    background: linear-gradient(120deg, rgba(15, 45, 82, 0.12), rgba(28, 77, 134, 0.08));
    border-bottom: 1px solid var(--border);
  }

  .dfd-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    padding: 18px;
  }

  .dfd-card {
    border: 1px solid var(--border);
    background: var(--surface-soft);
    border-radius: 12px;
    padding: 12px;
  }

  .dfd-card h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .dfd-card.full {
    grid-column: 1 / -1;
  }

  .dfd-card p {
    margin: 0;
    white-space: pre-wrap;
  }

  .dfd-list {
    margin: 0;
    padding-left: 16px;
    display: grid;
    gap: 4px;
  }

  .assinatura-box {
    margin-top: 18px;
    max-width: 420px;
  }

  .assinatura-line {
    border-top: 1px solid var(--text);
    margin-bottom: 8px;
  }

  .dfd-sheet table {
    table-layout: fixed;
  }

  .dfd-sheet th,
  .dfd-sheet td {
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  @media print {
    header, .dfd-actions { display: none !important; }
    main { padding: 0; max-width: none; }
    .dfd-sheet { border: none; box-shadow: none; }
  }

  @media (max-width: 900px) {
    .dfd-grid { grid-template-columns: 1fr; }
  }
</style>
{% endblock %}

{% block content %}
<div class="dfd-wrap">
  <div class="dfd-header">
    <div>
      <h2 class="dfd-title">Pré-visualização da DFD</h2>
      <p class="dfd-subtitle">Processo {{ processo.numero_processo_principal }}</p>
    </div>
    <div class="dfd-actions">
      <a class="btn" href="{% url 'workflow:planejamento_detail' processo.id %}">Voltar ao planejamento</a>
      <button type="button" onclick="window.print()">Imprimir</button>
      <a class="btn" href="{% url 'workflow:planejamento_exportar' processo.id 'dfd' 'docx' %}">Gerar DOCX</a>
      <a class="btn" href="{% url 'workflow:planejamento_exportar' processo.id 'dfd' 'pdf' %}">Gerar PDF</a>
    </div>
  </div>

  {% include 'workflow/_dfd_preview_sheet.html' %}
</div>
{% endblock %}
